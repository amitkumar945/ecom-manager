<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcomAdmin • Full Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar p-3" style="width: 260px; height: 100vh; position: fixed;">
            <h4 class="fw-bold mb-4 text-primary"><i class="bi bi-shop me-2"></i>EcomAdmin</h4>
            <ul class="nav flex-column">
                <li><a href="#" onclick="showSection('dashboard')" class="nav-link active"><i class="bi bi-speedometer2 me-2"></i>Dashboard</a></li>
                <li><a href="#" onclick="showSection('products')" class="nav-link"><i class="bi bi-box-seam me-2"></i>Products</a></li>
                <li><a href="#" onclick="showSection('customers')" class="nav-link"><i class="bi bi-people me-2"></i>Customers</a></li>
                <li><a href="#" onclick="showSection('orders')" class="nav-link"><i class="bi bi-cart-check me-2"></i>Orders</a></li>
                <li><a href="#" onclick="showSection('reviews')" class="nav-link"><i class="bi bi-star me-2"></i>Reviews</a></li>
            </ul>
            <div class="mt-auto pt-4 border-top text-light opacity-75 small">
                MongoDB Live • Haridwar, Uttarakhand
            </div>
        </div>

        <!-- Main Content -->
        <div style="margin-left: 260px; width: 100%;">
            <nav class="navbar navbar-dark bg-dark px-4 py-3">
                <h3 class="mb-0 text-white" id="pageTitle">Dashboard</h3>
                <div>
                    <span class="badge bg-success me-3"><i class="bi bi-database me-1"></i>Connected</span>
                    <button onclick="logout()" class="btn btn-outline-light btn-sm">Logout</button>
                </div>
            </nav>

            <!-- DASHBOARD -->
            <div id="dashboard" class="section p-4">
                <div class="row g-4" id="statsCards"></div>
                <h4 class="mt-5 mb-3">Recent Orders</h4>
                <div class="card p-0"><div class="table-responsive"><table class="table mb-0" id="recentOrdersTable"></table></div></div>
            </div>

            <!-- PRODUCTS -->
            <div id="products" class="section p-4 d-none">
                <div class="d-flex justify-content-between mb-3">
                    <h4>Products</h4>
                    <button onclick="openProductModal()" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Add Product</button>
                </div>
                <div class="card"><div class="table-responsive"><table class="table" id="productsTable"></table></div></div>
            </div>

            <!-- CUSTOMERS -->
            <div id="customers" class="section p-4 d-none">
                <div class="d-flex justify-content-between mb-3">
                    <h4>Customers</h4>
                    <button onclick="openCustomerModal()" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Add Customer</button>
                </div>
                <div class="card"><div class="table-responsive"><table class="table" id="customersTable"></table></div></div>
            </div>

            <!-- ORDERS -->
            <div id="orders" class="section p-4 d-none">
                <div class="d-flex justify-content-between mb-3">
                    <h4>Orders</h4>
                    <button onclick="openOrderModal()" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Add Order</button>
                </div>
                <div class="card"><div class="table-responsive"><table class="table" id="ordersTable"></table></div></div>
            </div>

            <!-- REVIEWS -->
            <div id="reviews" class="section p-4 d-none">
                <div class="d-flex justify-content-between mb-3">
                    <h4>Reviews</h4>
                    <button onclick="openReviewModal()" class="btn btn-primary"><i class="bi bi-plus-circle me-2"></i>Add Review</button>
                </div>
                <div class="card"><div class="table-responsive"><table class="table" id="reviewsTable"></table></div></div>
            </div>
        </div>
    </div>

    <!-- ==================== ALL MODALS ==================== -->

    <!-- Product Modal -->
    <div class="modal fade" id="productModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="productModalTitle">Add Product</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="productId">
                    <div class="mb-3"><label>Product Name</label><input id="pName" class="form-control" required></div>
                    <div class="row">
                        <div class="col-6 mb-3"><label>Category</label><input id="pCategory" class="form-control"></div>
                        <div class="col-6 mb-3"><label>Price (₹)</label><input id="pPrice" type="number" class="form-control" required></div>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3"><label>Stock</label><input id="pStock" type="number" class="form-control" required></div>
                        <div class="col-6 mb-3"><label>Status</label>
                            <select id="pStatus" class="form-select"><option>In Stock</option><option>Out of Stock</option></select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="saveProduct()" class="btn btn-primary">Save to MongoDB</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Customer Modal -->
    <div class="modal fade" id="customerModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="customerModalTitle">Add Customer</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="customerId">
                    <div class="mb-3"><label>Name</label><input id="cName" class="form-control" required></div>
                    <div class="mb-3"><label>Email</label><input id="cEmail" type="email" class="form-control" required></div>
                    <div class="mb-3"><label>Phone</label><input id="cPhone" class="form-control"></div>
                </div>
                <div class="modal-footer">
                    <button onclick="saveCustomer()" class="btn btn-primary">Save to MongoDB</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Order Modal -->
    <div class="modal fade" id="orderModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="orderModalTitle">Add Order</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="orderId">
                    <div class="mb-3"><label>Customer Name</label><input id="oCustomer" class="form-control" required></div>
                    <div class="mb-3"><label>Product</label><input id="oProduct" class="form-control" required></div>
                    <div class="row">
                        <div class="col-6 mb-3"><label>Amount (₹)</label><input id="oAmount" type="number" class="form-control" required></div>
                        <div class="col-6 mb-3"><label>Status</label>
                            <select id="oStatus" class="form-select">
                                <option>Pending</option><option>Processing</option><option>Shipped</option><option>Delivered</option><option>Cancelled</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button onclick="saveOrder()" class="btn btn-primary">Save to MongoDB</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div class="modal fade" id="reviewModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header"><h5 class="modal-title" id="reviewModalTitle">Add Review</h5></div>
                <div class="modal-body">
                    <input type="hidden" id="reviewId">
                    <div class="mb-3"><label>Customer</label><input id="rCustomer" class="form-control" required></div>
                    <div class="mb-3"><label>Product</label><input id="rProduct" class="form-control" required></div>
                    <div class="mb-3"><label>Rating (1-5)</label><input id="rRating" type="number" min="1" max="5" class="form-control" required></div>
                    <div class="mb-3"><label>Comment</label><textarea id="rComment" class="form-control" rows="3"></textarea></div>
                </div>
                <div class="modal-footer">
                    <button onclick="saveReview()" class="btn btn-primary">Save to MongoDB</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
